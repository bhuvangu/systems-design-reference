<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Systems Design Reference</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:opsz,ital,wght@6..72,0,400;6..72,0,600;6..72,0,700;6..72,1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root{ --ink:#16181d; --soft:#444a54; --faint:#7e8590; --paper:#fcfbf8; --rust:#b03f1c; --line:#e6e3da; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'IBM Plex Mono',monospace; color:var(--ink);
    background:var(--paper);
    background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,.02) 1px, transparent 0);
    background-size:16px 16px;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:40px 20px; -webkit-font-smoothing:antialiased;
  }
  .card{ max-width:560px; text-align:left; }
  .kicker{ font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--rust); margin-bottom:14px; }
  h1{ font-family:'Newsreader',serif; font-size:44px; font-weight:700; letter-spacing:-1px; line-height:1.02; }
  h1 em{ font-style:italic; color:var(--rust); }
  p{ font-family:'Newsreader',serif; font-size:17px; color:var(--soft); margin-top:18px; line-height:1.5; }
  .rule{ height:3px; background:var(--ink); margin:22px 0 0; }
  .foot{ margin-top:18px; font-size:10.5px; letter-spacing:.6px; color:var(--faint); }
</style>
</head>
<body>
  <div class="card">
    <div class="kicker">Reference Collection</div>
    <h1>Systems Design <em>Reference</em></h1>
    <p>A working collection of dense, print-ready reference material for system design and software architecture.</p>
    <div class="rule"></div>
    <div class="foot">STATIC SITE</div>
  </div>
</body>
</html>
